version: "3.9"

services:
  node:
    build: ./node
    container_name: node-app
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: fullcycle
    expose:
      - "3000"
    depends_on:
      - mysql

  nginx:
    build: ./nginx
    container_name: node-nginx-proxy
    depends_on:
      - node
    ports:
      - "8080:80"
    networks:
      - default
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: node-mysql
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fullcycle
    tty: true
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - default

networks:
  default:
    name: node-nginx-net

